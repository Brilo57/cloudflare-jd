<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>京东返利工具</title>
  <meta name="description" content="移动端优先的京东返利链接查询工具">
  <link rel="stylesheet" href="/app.css">
</head>
<body>
  <main class="page">
    <section class="card hero">
      <p class="eyebrow">JD TOOL</p>
      <h1>京东返利工具</h1>
      <p class="subtext">粘贴商品链接或分享文案，快速获取返利信息和购买入口。</p>
    </section>

    <section class="card form-card">
      <form id="jd-form" class="form">
        <label class="label" for="jd-input">京东链接</label>
        <textarea
          id="jd-input"
          class="textarea"
          rows="4"
          placeholder="支持粘贴 https://item.jd.com/... 或 京东分享文案中的 https://3.cn/..."
          required
        ></textarea>
        <button id="submit-button" class="button" type="submit">立即查询</button>
      </form>
      <p id="hint" class="hint">建议直接粘贴完整分享文案，系统会自动提取链接。</p>
    </section>

    <section id="status-card" class="card status hidden" aria-live="polite">
      <p id="status-text"></p>
    </section>

    <section id="result-card" class="card result hidden">
      <div class="section-head">
        <p class="section-kicker">查询结果</p>
        <span class="section-badge">JD</span>
      </div>

      <div class="result-header">
        <div class="title-wrap">
          <h2 id="result-title"></h2>
          <p id="result-shop" class="shop"></p>
        </div>
      </div>

      <div id="image-wrap" class="image-wrap hidden">
        <img id="result-image" class="result-image" alt="商品图片" loading="lazy">
      </div>

      <div class="price-block">
        <div class="price-item">
          <span class="meta-label">券后价</span>
          <strong id="result-price" class="price"></strong>
        </div>
        <div class="price-item muted rebate-card">
          <span class="meta-label">返利金额</span>
          <strong id="result-commission" class="price rebate"></strong>
        </div>
      </div>

      <p id="result-desc" class="desc hidden"></p>

      <div class="actions">
        <button id="buy-button" class="button" type="button">打开购买链接</button>
        <button id="reset-button" class="button button-secondary" type="button">重新查询</button>
      </div>
    </section>
  </main>

  <script src="/app.js" defer></script>
</body>
</html>
